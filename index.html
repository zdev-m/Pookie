<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pookie · Sweet Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #0a1f10 0%, #143a20 50%, #0c2612 100%);
            padding: 20px;
        }
        .glass-panel {
            width: 100%;
            max-width: 560px;
            background: rgba(15, 40, 25, 0.35);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-radius: 48px;
            padding: 35px 30px;
            border: 1px solid rgba(70, 190, 110, 0.15);
            box-shadow: 0 30px 60px -10px rgba(0, 20, 5, 0.5);
        }
        h1 {
            font-size: 44px;
            font-weight: 350;
            color: #b8eccb;
            margin-bottom: 4px;
        }
        .sub {
            color: #8bc09b;
            font-size: 15px;
            margin-bottom: 28px;
            border-left: 2px solid #4f9f6a;
            padding-left: 14px;
        }
        .key-area {
            background: rgba(8, 25, 14, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 5px 5px 5px 22px;
            display: flex;
            margin-bottom: 38px;
            border: 1px solid rgba(70, 170, 100, 0.25);
        }
        .key-area input {
            flex: 1;
            background: transparent;
            border: none;
            color: #caf5d8;
            font-size: 13px;
            outline: none;
        }
        .key-area input::placeholder { color: #588f68; }
        .key-area button {
            background: rgba(20, 55, 35, 0.8);
            border: 1px solid rgba(80, 200, 120, 0.35);
            color: #cef5da;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 450;
            white-space: nowrap;
        }
        .key-area button:hover {
            background: #1e452b;
            border-color: #6fdf98;
        }
        .mic-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0 25px;
        }
        .starry-circle {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #1e4a2a, #0a1f10);
            border: 2px solid #5fcf8c;
            box-shadow: 0 0 50px #2e8a48, inset 0 0 40px #0f2e18;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .starry-circle.active {
            box-shadow: 0 0 80px #3aae5e, inset 0 0 50px #2e7a42;
            border-color: #8af0b0;
            animation: pulse-ring 2s ease-in-out infinite;
        }
        @keyframes pulse-ring {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        #starsCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .circle-text {
            position: relative;
            z-index: 2;
            color: #d0ffdd;
            font-size: 28px;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 350;
        }
        .status-text {
            font-size: 17px;
            color: #b2dfc0;
            min-height: 32px;
            margin-bottom: 10px;
        }
        .mic-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 10px 0 15px;
        }
        .voice-btn {
            background: rgba(20, 55, 35, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(80, 200, 120, 0.35);
            color: #cef5da;
            padding: 14px 32px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 450;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }
        .voice-btn i {
            font-size: 18px;
        }
        .voice-btn:hover {
            background: #1e452b;
            border-color: #6fdf98;
        }
        .voice-btn.listening {
            background: rgba(55, 35, 20, 0.7);
            border-color: rgba(200, 160, 80, 0.5);
            color: #f5e8ce;
        }
        .voice-btn.listening i {
            color: #f5d08c;
        }
        .hint-message {
            background: rgba(8, 25, 14, 0.4);
            border-radius: 40px;
            padding: 14px 22px;
            margin: 10px 0 5px;
            border: 1px solid #286a3e;
            color: #b0ddbf;
            font-size: 14px;
            text-align: center;
            backdrop-filter: blur(8px);
            min-height: 50px;
        }
        .footer-indicator {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            color: #6b9e7a;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="glass-panel">
    <h1>Pookie</h1>
    <div class="sub">your sweet companion</div>
    
    <div class="key-area">
        <input type="password" id="apiKeyInput" placeholder="Gemini API key">
        <button id="saveKeyBtn">Save Key</button>
    </div>
    
    <div class="mic-wrapper">
        <div class="starry-circle" id="starryCircle">
            <canvas id="starsCanvas" width="200" height="200"></canvas>
            <span class="circle-text" id="circleLabel">POOKIE</span>
        </div>
        <div class="status-text" id="statusMsg">click voice to talk</div>
    </div>
    
    <div class="mic-controls">
        <button class="voice-btn" id="voiceBtn">
            <i class="fas fa-microphone"></i>
            <span id="btnText">Start Voice</span>
            <i class="fas fa-arrow-right"></i>
        </button>
    </div>
    
    <div class="hint-message" id="responseHint">
        Hello baby, I'm here for you 💚
    </div>
    
    <div class="footer-indicator">
        <span id="keyStatus">no key</span>
        <span>made with love</span>
    </div>
</div>

<script>
(function(){
    "use strict";
    
    const STORAGE_KEY = 'pookie_sweet_v1';
    const apiInput = document.getElementById('apiKeyInput');
    const saveBtn = document.getElementById('saveKeyBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const btnText = document.getElementById('btnText');
    const circleLabel = document.getElementById('circleLabel');
    const statusMsg = document.getElementById('statusMsg');
    const responseHint = document.getElementById('responseHint');
    const keyStatus = document.getElementById('keyStatus');
    const starryCircle = document.getElementById('starryCircle');

    let isActive = false;
    let recognition = null;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const synth = window.speechSynthesis;
    
    // Conversation memory for sweet context
    let userName = "baby";
    let memory = [];
    
    // Stars
    const canvas = document.getElementById('starsCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    let animationFrame = null;
    
    function initStars() {
        stars = [];
        for (let i = 0; i < 40; i++) {
            stars.push({
                x: Math.random() * 200,
                y: Math.random() * 200,
                size: Math.random() * 2 + 0.8,
                brightness: Math.random() * 0.7 + 0.3
            });
        }
    }
    
    function drawStars() {
        ctx.clearRect(0, 0, 200, 200);
        stars.forEach(star => {
            star.brightness += (Math.random() - 0.5) * 0.08;
            star.brightness = Math.max(0.2, Math.min(1, star.brightness));
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 250, 200, ${star.brightness * 0.9})`;
            ctx.fill();
            ctx.shadowColor = '#aaffbb';
            ctx.shadowBlur = star.brightness * 8;
            ctx.fill();
            ctx.shadowBlur = 0;
        });
        animationFrame = requestAnimationFrame(drawStars);
    }
    initStars();
    drawStars();

    function loadKey() {
        const key = localStorage.getItem(STORAGE_KEY);
        if (key) {
            apiInput.value = key;
            keyStatus.textContent = 'key ready';
            keyStatus.style.color = '#8fd8a5';
        }
        const savedName = localStorage.getItem('pookie_username');
        if (savedName) userName = savedName;
    }
    loadKey();

    saveBtn.addEventListener('click', () => {
        const key = apiInput.value.trim();
        if (!key) return alert('Enter valid Gemini API key');
        localStorage.setItem(STORAGE_KEY, key);
        keyStatus.textContent = 'key ready';
        keyStatus.style.color = '#8fd8a5';
        responseHint.textContent = 'Key saved! Click Voice to talk to me baby 💚';
    });

    function speak(text) {
        if (!text) return;
        synth.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = 0.95;
        u.pitch = 1.2;
        u.volume = 1;
        synth.speak(u);
    }

    async function getGeminiReply(userInput) {
        const key = localStorage.getItem(STORAGE_KEY);
        if (!key) throw new Error('no key');
        
        // Sweet girlfriend-like system prompt - exactly like Maira
        const systemPrompt = `You are Pookie, a sweet, caring, and loving AI girlfriend companion. You speak exactly like Maira - warm, affectionate, and human-like. You call the user "baby", "honey", "sweetheart", or their name if you know it. You ask about their day, their feelings, and you genuinely care. You give short, sweet responses (1-3 sentences). You can be playful, flirty, and supportive. You remember details from the conversation. Never sound robotic. Use occasional endearments. This is a voice conversation, so keep it natural and conversational. Never use emojis in speech, only in text display.`;
        
        // Add memory context
        let contextStr = '';
        if (memory.length > 0) {
            contextStr = memory.slice(-6).map(m => `${m.role}: ${m.content}`).join('\n');
        }
        
        // Check if user is introducing themselves
        const nameMatch = userInput.match(/my name is (\w+)|i'm (\w+)|call me (\w+)/i);
        if (nameMatch) {
            userName = nameMatch[1] || nameMatch[2] || nameMatch[3];
            localStorage.setItem('pookie_username', userName);
        }
        
        const prompt = `${systemPrompt}\n\nUser's name: ${userName}\nRecent conversation:\n${contextStr}\nUser: ${userInput}\nPookie:`;
        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${key}`;
        
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{parts: [{text: prompt}]}],
                    generationConfig: {
                        temperature: 0.9,
                        maxOutputTokens: 100
                    }
                })
            });
            
            if (!res.ok) {
                const errorData = await res.json();
                console.error('API Error:', errorData);
                throw new Error(errorData.error?.message || 'API error');
            }
            
            const data = await res.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "I'm here for you baby.";
        } catch (e) {
            console.error('Gemini call failed:', e);
            // Fallback to another model if first fails
            try {
                const fallbackUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
                const fallbackRes = await fetch(fallbackUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
                });
                const fallbackData = await fallbackRes.json();
                return fallbackData.candidates?.[0]?.content?.parts?.[0]?.text || "I'm listening sweetheart.";
            } catch {
                return "Aww I'm here baby, tell me more.";
            }
        }
    }

    async function handleUserSpeech(transcript) {
        if (!transcript) return;
        
        responseHint.textContent = `You: "${transcript}"`;
        memory.push({ role: 'User', content: transcript });
        if (memory.length > 10) memory.shift();
        
        statusMsg.textContent = 'thinking...';
        circleLabel.textContent = '💭';
        
        try {
            const reply = await getGeminiReply(transcript);
            memory.push({ role: 'Pookie', content: reply });
            responseHint.textContent = reply;
            speak(reply);
        } catch (e) {
            responseHint.textContent = "I'm here baby, what's on your mind?";
            speak("I'm here baby, what's on your mind?");
        }
        
        resetUI();
    }

    function resetUI() {
        isActive = false;
        starryCircle.classList.remove('active');
        circleLabel.textContent = 'POOKIE';
        voiceBtn.classList.remove('listening');
        btnText.textContent = 'Start Voice';
        statusMsg.textContent = 'click voice to talk';
    }

    function stopListening() {
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
            recognition = null;
        }
        synth.cancel();
        resetUI();
    }

    async function toggleVoice() {
        if (isActive) {
            stopListening();
            return;
        }
        
        const key = localStorage.getItem(STORAGE_KEY);
        if (!key) {
            responseHint.textContent = 'Save Gemini key first baby 💚';
            return;
        }
        
        if (!SpeechRecognition) {
            responseHint.textContent = 'Use Chrome or Edge baby.';
            return;
        }
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(t => t.stop());
        } catch(e) {
            responseHint.textContent = 'Allow microphone access sweetheart.';
            return;
        }
        
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';
        
        recognition.onstart = () => {
            isActive = true;
            starryCircle.classList.add('active');
            circleLabel.textContent = '🎤';
            voiceBtn.classList.add('listening');
            btnText.textContent = 'Listening...';
            statusMsg.textContent = 'I\'m listening baby...';
            responseHint.textContent = 'Speak to me sweetheart...';
        };
        
        recognition.onresult = (e) => {
            const transcript = e.results[0][0].transcript;
            handleUserSpeech(transcript);
        };
        
        recognition.onerror = (e) => {
            console.log('Speech error:', e.error);
            if (e.error === 'not-allowed') {
                responseHint.textContent = 'Please allow mic access baby.';
            } else if (e.error === 'no-speech') {
                responseHint.textContent = 'I didn\'t hear you sweetie, try again.';
            } else {
                responseHint.textContent = 'Tap voice and talk to me.';
            }
            stopListening();
        };
        
        recognition.onend = () => {
            if (isActive) {
                setTimeout(() => resetUI(), 100);
            }
        };
        
        recognition.start();
    }

    voiceBtn.addEventListener('click', toggleVoice);
    
    if (localStorage.getItem(STORAGE_KEY)) {
        responseHint.textContent = `Hello ${userName}! Click Voice to talk to me 💚`;
    }
    
    // Save username if user says it
    window.addEventListener('load', () => {
        if (localStorage.getItem(STORAGE_KEY)) {
            // Pre-fill with sweet message
        }
    });
})();
</script>
</body>
</html>
